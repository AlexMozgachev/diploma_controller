[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs

; Только нужные библиотеки
lib_deps = 
    h2zero/NimBLE-Arduino@^1.4.0

build_flags = 
    -DCORE_DEBUG_LEVEL=0

monitor_filters = 
    esp32_exception_decoder
    time